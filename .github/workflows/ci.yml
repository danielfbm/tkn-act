name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    name: build & test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (with race)
        run: go test -race -count=1 ./...
      - name: smoke — help-json
        run: |
          go build -o tkn-act ./cmd/tkn-act
          ./tkn-act help-json | jq -e '.exit_codes | length >= 7' >/dev/null

  tests-required:
    name: tests required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: assert tests accompany code changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/tests-required.sh "$BASE" "$HEAD"

  coverage:
    name: coverage no-drop
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: assert no per-package coverage drop vs target branch
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/coverage-check.sh "$BASE" "$HEAD"

  parity-check:
    name: parity-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assert docs/feature-parity.md matches the tree
        run: bash .github/scripts/parity-check.sh
