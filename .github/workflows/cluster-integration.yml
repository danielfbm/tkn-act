name: cluster-integration

# Runs the k3d cluster-backend end-to-end suite (build tag: cluster). Boots
# an ephemeral k3d cluster, installs Tekton via the project's installer, and
# runs the cluster-e2e tests against it.
#
# Gated by paths on PRs (cluster code paths only) to avoid the 5-10 minute
# cluster bring-up cost on unrelated PRs. Unconditional on main / release/*.

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    paths:
      # Cluster-specific code.
      - 'cmd/tkn-act/cluster*.go'
      - 'cmd/tkn-act/doctor*.go'
      - 'internal/backend/backend.go'
      - 'internal/backend/cluster/**'
      - 'internal/cluster/**'
      - 'internal/clustere2e/**'
      - 'internal/cmdrunner/**'
      # Engine + types may change pipeline-run semantics that the cluster
      # path delegates to the real Tekton controller.
      - 'internal/engine/**'
      - 'internal/loader/**'
      - 'internal/tektontypes/**'
      - 'internal/validator/**'
      - 'testdata/e2e/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/cluster-integration.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: k3d e2e (-tags cluster) — Tekton ${{ matrix.tekton-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Oldest still-supported LTS + newest LTS (Tekton's support window
        # is 12 months from release). Keep this list aligned with
        # https://github.com/tektoncd/pipeline/blob/main/releases.md and
        # bump per the policy in
        # docs/superpowers/specs/2026-05-13-tekton-bump-and-matrix-design.md.
        tekton-version:
          - v1.3.0
          - v1.12.0
    env:
      K3D_VERSION: v5.7.4
      KUBECTL_VERSION: v1.31.0
      TKN_ACT_TEKTON_VERSION: ${{ matrix.tekton-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install kubectl ${{ env.KUBECTL_VERSION }}
        run: |
          curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: install k3d ${{ env.K3D_VERSION }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh \
            | TAG=${K3D_VERSION} bash
          k3d version

      - name: doctor (sanity)
        run: |
          go build -o tkn-act ./cmd/tkn-act
          ./tkn-act doctor -o json

      - name: go test -tags cluster ./internal/clustere2e/...
        run: go test -tags cluster -count=1 -timeout 25m ./internal/clustere2e/...

      - name: dump cluster state on failure
        if: failure()
        run: |
          set +e
          # The cluster-e2e harness names the k3d cluster `tkn-act-e2e`;
          # k3d derives kube context as `k3d-<cluster>`. (Earlier this
          # step used `k3d-tkn-act` and silently emitted "context was not
          # found" — debug output was empty for every prior cluster-CI
          # failure.)
          CTX=k3d-tkn-act-e2e
          k3d cluster list || true
          kubectl --context "$CTX" get nodes -o wide || true
          kubectl --context "$CTX" get ns || true
          kubectl --context "$CTX" get pods --all-namespaces -o wide || true
          kubectl --context "$CTX" describe pods --all-namespaces || true
          # `kubectl logs` doesn't accept --all-namespaces; iterate the
          # tekton-pipelines namespace explicitly.
          kubectl --context "$CTX" -n tekton-pipelines logs -l app.kubernetes.io/name=controller --tail=400 --all-containers || true
          # Dump every PipelineRun/TaskRun the harness left behind so a
          # classification mismatch (status = X, want Y) can be attributed
          # to a specific Tekton condition reason.
          for ns in $(kubectl --context "$CTX" get ns -o jsonpath='{.items[?(@.metadata.name)].metadata.name}' 2>/dev/null); do
            case "$ns" in
              tkn-act-*)
                echo "===== $ns ====="
                kubectl --context "$CTX" -n "$ns" get pipelinerun,taskrun -o wide || true
                kubectl --context "$CTX" -n "$ns" get pipelinerun -o yaml || true
                kubectl --context "$CTX" -n "$ns" get taskrun -o yaml || true
                ;;
            esac
          done

      - name: tear down cluster
        if: always()
        run: ./tkn-act cluster down -y || true
