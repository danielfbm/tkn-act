# Demonstrates: Task `sidecars:` — long-lived helper containers (databases,
# proxies, mock services) that share the network with the Task's steps.
#
# Real Tekton:  The redis sidecar starts before the steps; steps connect to
#               it on `localhost:6379` because all containers in the pod
#               share a network namespace. Sidecars are torn down when the
#               final step exits.
#
# tkn-act docker backend:
#               TaskSpec.Sidecars is not modeled in tektontypes.TaskSpec, so
#               the `sidecars:` block is dropped at parse time. Each step
#               gets its own container with its own network namespace —
#               there's no `localhost:6379` to talk to.
#
# Observed:     `query` step fails to connect to redis ("Could not connect"
#               or DNS error), Task fails. There is no workaround in pure
#               docker mode short of starting the sidecar yourself outside
#               of tkn-act and exposing it on host networking.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: with-redis
spec:
  sidecars:                                # <-- silently dropped by tkn-act
    - name: redis
      image: redis:7-alpine
  steps:
    - name: query
      image: redis:7-alpine
      script: |
        # In real Tekton this works; in tkn-act docker mode there is no
        # `redis` to talk to on localhost.
        redis-cli -h 127.0.0.1 -p 6379 SET hello world
        redis-cli -h 127.0.0.1 -p 6379 GET hello
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: with-redis
spec:
  tasks:
    - name: with-redis
      taskRef: { name: with-redis }
