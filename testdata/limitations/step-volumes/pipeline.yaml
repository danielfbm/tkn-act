# Demonstrates: TaskSpec `volumes:` + Step `volumeMounts:` for non-workspace
# data — typically configMap, secret, or downwardAPI mounts.
#
# Real Tekton:  The configMap volume is mounted into the step at
#               /etc/app-config. The step reads its values directly from
#               the filesystem — no workspace, no params.
#
# tkn-act docker backend:
#               TaskSpec.Volumes and Step.VolumeMounts are not modeled in
#               internal/tektontypes/types.go. Only declared workspaces are
#               bind-mounted (internal/backend/docker/docker.go:168-175).
#               The configMap concept doesn't exist outside Kubernetes.
#
# Observed:     `cat /etc/app-config/greeting` returns "No such file or
#               directory" and the step exits 1.
#
# Workaround:   Pass the value as a param, or write it to a workspace from
#               a prior step.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: configmap-eater
spec:
  volumes:                              # <-- silently dropped by tkn-act
    - name: app-config
      configMap:
        name: app-config
  steps:
    - name: read
      image: alpine:3
      volumeMounts:                     # <-- silently dropped by tkn-act
        - name: app-config
          mountPath: /etc/app-config
      script: |
        cat /etc/app-config/greeting
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: configmap-eater
spec:
  tasks:
    - name: configmap-eater
      taskRef: { name: configmap-eater }
