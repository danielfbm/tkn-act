apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tk
spec:
  displayName: "Unit-test runner"
  description: "Runs `go test ./...`."
  steps:
    - name: compile
      displayName: "Compile"
      description: "Compile the test binary."
      image: alpine:3
      script: |
        # Sleep first so the cluster backend's log-streaming goroutine
        # (which sleeps 500ms before opening a log stream) has time to
        # attach before the pod terminates.
        sleep 2
        echo "compiling"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: display-name-description
spec:
  displayName: "Build & test"
  description: "Build then test."
  tasks:
    - name: t1
      displayName: "Compile binary"
      taskRef: { name: tk }
  finally:
    - name: notify
      displayName: "Send notification"
      taskRef: { name: tk }
