apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hangs
spec:
  steps:
    - name: sleep
      image: alpine:3
      script: |
        sleep 30
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: ok
      image: alpine:3
      script: |
        echo "cleanup ran"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: tasks-timeout
spec:
  timeouts:
    tasks: "2s"
    finally: "30s"
  tasks:
    - name: t
      taskRef: { name: hangs }
  finally:
    - name: c
      taskRef: { name: cleanup }
