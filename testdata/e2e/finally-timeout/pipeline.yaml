apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivial
spec:
  steps:
    - name: ok
      image: alpine:3
      script: |
        echo "ok"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hangs
spec:
  steps:
    - name: sleep
      image: alpine:3
      script: |
        sleep 30
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: finally-timeout
spec:
  timeouts:
    finally: "2s"
  tasks:
    - name: t
      taskRef: { name: trivial }
  finally:
    - name: c
      taskRef: { name: hangs }
